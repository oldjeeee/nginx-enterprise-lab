services:
  nginx:
    image: nginx:1.27-alpine
    container_name: prod-nginx-proxy
    command: ["/bin/sh", "-c", "rm -f /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"]
    ports:
      - "8080:80"
      - "443:443"
      - "443:443/udp"
      - "4318:4318"
    volumes:
      - ./ansible/roles/nginx/templates/nginx.conf.j2:/etc/nginx/conf.d/app.conf:ro
      - ./certs:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    environment:
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend_net
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports: ["4317:4317"]
    volumes:
      - ./otel-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend_net
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus.yml:ro
    networks: [backend_net]
  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_storage:/var/lib/grafana
    depends_on: [prometheus]
    networks: [backend_net]
  backend:
    image: python:3.11-alpine
    container_name: lab-backend
    command: python -m http.server 8080
    working_dir: /srv
    volumes:
      - ./backend-content:/srv:ro
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 2

volumes:
  nginx_logs:
  grafana_storage:

networks:
  backend_net:
    driver: bridge
    internal: false